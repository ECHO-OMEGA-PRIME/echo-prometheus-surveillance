name = "echo-prometheus-surveillance"
main = "src/index.ts"
compatibility_date = "2024-12-01"
usage_model = "unbound"

[vars]
ENVIRONMENT = "production"
VERSION = "2.0.0"
PROMETHEUS_URL = "http://192.168.1.202:8370"
CHARLIE_NODE = "192.168.1.202"
COMMANDER_API_URL = "https://commander.echo-op.com"

[[d1_databases]]
binding = "DB"
database_name = "echo-prometheus-surveillance"
database_id = "f565c442-b7cb-4ace-9dea-d481dc51c80d"

[[kv_namespaces]]
binding = "CACHE"
id = "f3835556417542848065e1bfa2e8005e"

[ai]
binding = "AI"

[[services]]
binding = "BRAIN"
service = "echo-shared-brain"

[[services]]
binding = "ENGINES"
service = "echo-engine-runtime"

[[services]]
binding = "SWARM"
service = "echo-swarm-brain"

[[services]]
binding = "PROMETHEUS"
service = "echo-prometheus-cloud"

[[services]]
binding = "PROMETHEUS_AI"
service = "echo-prometheus-ai"

[triggers]
crons = [
  "*/5 * * * *",
  "0 * * * *",
  "0 0 * * *"
]

[[analytics_engine_datasets]]
binding = "ANALYTICS"
dataset = "echo_metrics"
